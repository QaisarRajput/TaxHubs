<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid slice">
  <title id="title">Tax Hubs banner</title>
  <desc id="desc">Abstract green financial dashboard style banner background with soft gradients and chart lines.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06160C"/>
      <stop offset="0.45" stop-color="#0A2313"/>
      <stop offset="1" stop-color="#102F1C"/>
    </linearGradient>

    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(270 190) rotate(10) scale(450 260)">
      <stop offset="0" stop-color="#4ADE80" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#4ADE80" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(940 120) rotate(5) scale(380 220)">
      <stop offset="0" stop-color="#86EFAC" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#86EFAC" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(880 520) rotate(-8) scale(500 260)">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A7F3D0" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#4ADE80" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#A7F3D0" stop-opacity="0.2"/>
    </linearGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#A7F3D0" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <ellipse cx="270" cy="190" rx="450" ry="260" fill="url(#glowA)"/>
  <ellipse cx="940" cy="120" rx="380" ry="220" fill="url(#glowB)"/>
  <ellipse cx="880" cy="520" rx="500" ry="260" fill="url(#glowC)"/>

  <g opacity="0.65">
    <path d="M60 500C170 460 240 430 340 390C430 355 510 370 595 330C675 292 750 250 840 270C930 290 995 240 1140 150"
      stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
    <path d="M60 545C185 500 255 515 345 470C430 428 520 420 620 380C730 334 805 350 890 330C980 309 1060 250 1140 215"
      stroke="#34D399" stroke-opacity="0.5" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <g fill="#D1FAE5" fill-opacity="0.95" filter="url(#soft)">
    <circle cx="340" cy="390" r="8"/>
    <circle cx="595" cy="330" r="8"/>
    <circle cx="840" cy="270" r="8"/>
    <circle cx="1040" cy="200" r="8"/>
  </g>

  <g fill="#D1FAE5" fill-opacity="0.85">
    <circle cx="340" cy="390" r="4"/>
    <circle cx="595" cy="330" r="4"/>
    <circle cx="840" cy="270" r="4"/>
    <circle cx="1040" cy="200" r="4"/>
  </g>

  <g transform="translate(780 355)">
    <rect x="0" y="0" width="330" height="190" rx="18" fill="#0B1F13" fill-opacity="0.68" stroke="#4ADE80" stroke-opacity="0.2"/>
    <rect x="22" y="22" width="286" height="16" rx="8" fill="#14532D" fill-opacity="0.55"/>
    <rect x="22" y="54" width="210" height="12" rx="6" fill="#4ADE80" fill-opacity="0.40"/>
    <rect x="22" y="74" width="260" height="12" rx="6" fill="#4ADE80" fill-opacity="0.26"/>
    <rect x="22" y="94" width="170" height="12" rx="6" fill="#4ADE80" fill-opacity="0.20"/>

    <rect x="22" y="122" width="50" height="48" rx="8" fill="#22C55E" fill-opacity="0.35"/>
    <rect x="82" y="108" width="50" height="62" rx="8" fill="#22C55E" fill-opacity="0.55"/>
    <rect x="142" y="92" width="50" height="78" rx="8" fill="#22C55E" fill-opacity="0.75"/>
    <rect x="202" y="132" width="50" height="38" rx="8" fill="#22C55E" fill-opacity="0.45"/>
    <rect x="262" y="86" width="46" height="84" rx="8" fill="#22C55E" fill-opacity="0.65"/>
  </g>
</svg>
